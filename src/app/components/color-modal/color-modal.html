<div class="modal-overlay">
  <div class="modal-content">
    <h2 class="modal-title">ESCOLHA UMA COR</h2>
    <div class="color-options">
      <button
        class="color-btn vermelho"
        (click)="selectColor('red')"
      >
        VERMELHO
      </button>
      <button
        class="color-btn verde"
        (click)="selectColor('green')"
      >
        VERDE
      </button>
      <button
        class="color-btn azul"
        (click)="selectColor('blue')"
      >
        AZUL
      </button>
      <button
        class="color-btn amarelo"
        (click)="selectColor('yellow')"
      >
        AMARELO
      </button>
    </div>
  </div>
</div>
